<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL GAS - Servicio a Domicilio</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Titillium+Web:400,700&display=swap">
    <style>
        :root { --azul-oscuro: #003366; --azul-elgas: #075AA8; --naranja: #f38230; }
        body { font-family: 'Titillium Web', sans-serif; margin: 0; padding: 0; color: #333; background-color: #f9f9f9; }
        
        /* Navegación Superior */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; background: white; border-bottom: 1px solid #eee; }
        .logo-nav { height: 70px; }
        .menu { display: flex; gap: 25px; }
        .menu a { text-decoration: none; color: #333; font-weight: bold; font-size: 15px; }
        .menu a:hover, .menu a.active { color: var(--naranja); border-bottom: 2px solid var(--naranja); }
        .btn-top { background: var(--azul-oscuro); color: white; padding: 8px 20px; border-radius: 20px; font-weight: bold; }

        /* Sección Azul del Hero */
        .hero { background: var(--azul-oscuro); padding: 50px 20px; text-align: center; color: white; }
        .hero-img-box { background: white; display: inline-block; padding: 15px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .hero-img-box img { max-width: 320px; height: auto; display: block; }
        .hero h1 { font-size: 36px; margin: 0; font-weight: 500; letter-spacing: 1px; }

        /* Sección de Contacto */
        .contact-section { display: flex; justify-content: center; padding: 60px 5%; gap: 40px; flex-wrap: wrap; }
        
        /* Cuadro de Información (Gris/Negro) */
        .info-card { background: #333; color: white; padding: 45px; width: 100%; max-width: 380px; border-radius: 5px; text-align: left; }
        .info-card h3 { border-bottom: 2px solid white; padding-bottom: 15px; margin-top: 0; font-size: 20px; text-transform: uppercase; }
        .info-card p { margin: 20px 0; font-size: 17px; line-height: 1.6; }
        .info-card .policy-link { margin-top: 50px; font-weight: bold; color: white; text-decoration: none; display: block; }

        /* Cuadro de Formulario */
        .form-card { border: 1px solid #ddd; padding: 40px; width: 100%; max-width: 450px; border-radius: 10px; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .form-card h2 { margin-top: 0; font-size: 32px; font-family: 'Times New Roman', serif; margin-bottom: 25px; }
        .form-card input, .form-card textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        .btn-send { background: var(--azul-oscuro); color: white; border: none; padding: 14px 0; border-radius: 30px; font-weight: bold; width: 65%; font-size: 18px; cursor: pointer; }
        .btn-send:hover { background: var(--azul-elgas); }

        /* Iconos de Chat Flotantes */
        .floating-chat { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; align-items: flex-end; gap: 15px; }
        .chat-label { background: white; padding: 8px 18px; border-radius: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-weight: bold; font-size: 14px; }
        .ws-icon { background: #25d366; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        @media (max-width: 768px) { .hero h1 { font-size: 28px; } .btn-send { width: 100%; } .contact-section { padding: 30px 5%; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <img src="icon_el_gas.png" alt="Logo EL GAS" class="logo-nav">
        <div class="menu">
            <a href="#" class="active">Inicio</a>
            <a href="#">Servicios</a>
            <a href="#">Contacto</a>
        </div>
        <div class="btn-top">0981549785</div>
    </nav>

    <section class="hero">
        <div class="hero-img-box">
            <img src="icon_car.png" alt="Servicio El Gas">
        </div>
        <h1>Servicio a Domicilio</h1>
    </section>

    <section class="contact-section">
        <div class="info-card">
            <h3>Contáctanos</h3>
            <p><b>Teléfono:</b> 0981549785</p>
            <p><b>Ciudad:</b> Quito - Ecuador</p>
            <p><b>Email:</b> tgaplicacionec@appcarrera.com</p>
            <a href="#" class="policy-link">Politicas de Privacidad</a>
        </div>

        <div class="form-card">
            <h2>Contactanos</h2>
            <form action="#">
                <input type="text" placeholder="Nombre" required>
                <input type="email" placeholder="E-mail" required>
                <input type="tel" placeholder="Teléfono" required>
                <textarea placeholder="Mensaje" rows="4" required></textarea>
                <button type="submit" class="btn-send">ENVIAR</button>
            </form>
        </div>
    </section>

    <div class="floating-chat">
        <div class="chat-label">
            <span style="color:var(--azul-oscuro)">WEB</span> <span style="color:var(--naranja)">CHAT</span>
        </div>
        <a href="https://wa.me/593981549785" class="ws-icon" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="38" alt="WhatsApp">
        </a>
    </div>

</body>
</html>
